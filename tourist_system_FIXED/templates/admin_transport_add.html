{% extends "base.html" %}
{% block title %}Add Transport - Admin{% endblock %}
{% block extra_css %}
<style>
.edit-page { max-width:650px; margin:0 auto; padding:100px 1.5rem 3rem; }
.edit-card { background:white; border-radius:16px; padding:2.5rem; box-shadow:0 4px 20px rgba(0,0,0,0.08); }
.edit-card h2 { font-size:1.5rem; font-weight:700; color:#2d3436; margin-bottom:2rem; }
.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
.form-group { display:flex; flex-direction:column; gap:0.4rem; }
.form-group label { font-size:0.85rem; font-weight:600; color:#636e72; text-transform:uppercase; letter-spacing:0.5px; }
.form-group input, .form-group select {
    padding:0.65rem 0.9rem; border:1.5px solid #dfe6e9; border-radius:8px; font-size:0.9rem; outline:none; transition:border-color 0.2s;
}
.form-group input:focus, .form-group select:focus { border-color:#9b59b6; }
.form-full { grid-column:1/-1; }
.btn-row { display:flex; gap:0.8rem; margin-top:1.5rem; }
.btn-save { background:linear-gradient(135deg,#9b59b6,#8e44ad); color:white; padding:0.7rem 1.8rem; border-radius:10px; border:none; cursor:pointer; font-weight:600; font-size:0.95rem; }
.btn-cancel { background:#dfe6e9; color:#636e72; padding:0.7rem 1.5rem; border-radius:10px; border:none; cursor:pointer; font-weight:600; font-size:0.95rem; text-decoration:none; display:inline-flex; align-items:center; }
</style>
{% endblock %}

{% block content %}
<div class="edit-page">
    <div class="edit-card">
        <h2><i class="fas fa-plus-circle" style="color:#9b59b6;"></i> Add Transport Booking</h2>
        <form method="POST">
            <div class="form-grid">
                <div class="form-group form-full">
                    <label>User</label>
                    <select name="user_id" required>
                        <option value="">Select a user</option>
                        {% for u in users %}
                        <option value="{{ u.id }}">{{ u.full_name }} ({{ u.email }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>Transport Type</label>
                    <select name="transport_type" required>
                        <option value="">Select type</option>
                        <option>Car</option><option>Bus</option>
                        <option>Train</option><option>Flight</option><option>Taxi</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Travel Date</label>
                    <input type="date" name="travel_date" required>
                </div>
                <div class="form-group">
                    <label>Pickup Location</label>
                    <input type="text" name="pickup_location" placeholder="City / Address" required>
                </div>
                <div class="form-group">
                    <label>Drop Location</label>
                    <input type="text" name="drop_location" placeholder="City / Address" required>
                </div>
                <div class="form-group form-full">
                    <label>Status</label>
                    <select name="status">
                        <option value="pending">Pending</option>
                        <option value="confirmed">Confirmed</option>
                        <option value="completed">Completed</option>
                        <option value="cancelled">Cancelled</option>
                    </select>
                </div>
            </div>
            <div class="btn-row">
                <button type="submit" class="btn-save"><i class="fas fa-save"></i> Add Transport</button>
                <a href="{{ url_for('admin_transport') }}" class="btn-cancel"><i class="fas fa-arrow-left"></i>&nbsp;Back</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
