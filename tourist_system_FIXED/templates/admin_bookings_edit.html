{% extends "base.html" %}
{% block title %}Edit Booking - Admin{% endblock %}
{% block extra_css %}
<style>
.edit-page { max-width:650px; margin:0 auto; padding:100px 1.5rem 3rem; }
.edit-card { background:white; border-radius:16px; padding:2.5rem; box-shadow:0 4px 20px rgba(0,0,0,0.08); }
.edit-card h2 { font-size:1.5rem; font-weight:700; color:#2d3436; margin-bottom:0.5rem; }
.booking-meta { background:#f8f9fa; border-radius:10px; padding:1rem; margin-bottom:1.8rem; font-size:0.9rem; color:#636e72; }
.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
.form-group { display:flex; flex-direction:column; gap:0.4rem; }
.form-group label { font-size:0.85rem; font-weight:600; color:#636e72; text-transform:uppercase; letter-spacing:0.5px; }
.form-group input, .form-group select {
    padding:0.65rem 0.9rem; border:1.5px solid #dfe6e9; border-radius:8px; font-size:0.9rem; outline:none; transition:border-color 0.2s;
}
.form-group input:focus, .form-group select:focus { border-color:#2ecc71; }
.form-full { grid-column:1/-1; }
.btn-row { display:flex; gap:0.8rem; margin-top:1.5rem; }
.btn-save { background:linear-gradient(135deg,#2ecc71,#27ae60); color:white; padding:0.7rem 1.8rem; border-radius:10px; border:none; cursor:pointer; font-weight:600; font-size:0.95rem; }
.btn-cancel { background:#dfe6e9; color:#636e72; padding:0.7rem 1.5rem; border-radius:10px; border:none; cursor:pointer; font-weight:600; font-size:0.95rem; text-decoration:none; display:inline-flex; align-items:center; }
</style>
{% endblock %}

{% block content %}
<div class="edit-page">
    <div class="edit-card">
        <h2><i class="fas fa-edit" style="color:#2ecc71;"></i> Edit Booking #{{ booking.id }}</h2>
        <div class="booking-meta">
            Package: <strong>{{ booking.package.name }}</strong> &nbsp;|&nbsp;
            Amount: <strong style="color:#27ae60;">₹{{ "%.0f"|format(booking.total_amount) }}</strong>
        </div>
        <form method="POST">
            <div class="form-grid">
                <div class="form-group">
                    <label>Customer Name</label>
                    <input type="text" name="full_name" value="{{ booking.full_name }}" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" value="{{ booking.email }}" required>
                </div>
                <div class="form-group">
                    <label>Travel Date</label>
                    <input type="date" name="travel_date" value="{{ booking.travel_date }}" required>
                </div>
                <div class="form-group">
                    <label>Number of People</label>
                    <input type="number" name="num_people" value="{{ booking.num_people }}" min="1" required>
                </div>
                <div class="form-group form-full">
                    <label>Status</label>
                    <select name="status">
                        <option value="pending" {% if booking.status=='pending' %}selected{% endif %}>Pending</option>
                        <option value="confirmed" {% if booking.status=='confirmed' %}selected{% endif %}>Confirmed</option>
                        <option value="cancelled" {% if booking.status=='cancelled' %}selected{% endif %}>Cancelled</option>
                    </select>
                </div>
            </div>
            <div class="btn-row">
                <button type="submit" class="btn-save"><i class="fas fa-save"></i> Update Booking</button>
                <a href="{{ url_for('admin_bookings') }}" class="btn-cancel"><i class="fas fa-arrow-left"></i>&nbsp;Back</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
