{% extends "base.html" %}
{% block title %}Edit Package - Admin{% endblock %}
{% block extra_css %}
<style>
.edit-page { max-width:700px; margin:0 auto; padding:100px 1.5rem 3rem; }
.edit-card { background:white; border-radius:16px; padding:2.5rem; box-shadow:0 4px 20px rgba(0,0,0,0.08); }
.edit-card h2 { font-size:1.5rem; font-weight:700; color:#2d3436; margin-bottom:2rem; }
.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
.form-group { display:flex; flex-direction:column; gap:0.4rem; }
.form-group label { font-size:0.85rem; font-weight:600; color:#636e72; text-transform:uppercase; letter-spacing:0.5px; }
.form-group input, .form-group select, .form-group textarea {
    padding:0.65rem 0.9rem; border:1.5px solid #dfe6e9; border-radius:8px; font-size:0.9rem; outline:none; transition:border-color 0.2s;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color:#3498db; }
.form-full { grid-column:1/-1; }
.btn-row { display:flex; gap:0.8rem; margin-top:1.5rem; }
.btn-save { background:linear-gradient(135deg,#2ecc71,#27ae60); color:white; padding:0.7rem 1.8rem; border-radius:10px; border:none; cursor:pointer; font-weight:600; font-size:0.95rem; }
.btn-cancel { background:#dfe6e9; color:#636e72; padding:0.7rem 1.5rem; border-radius:10px; border:none; cursor:pointer; font-weight:600; font-size:0.95rem; text-decoration:none; display:inline-flex; align-items:center; }
</style>
{% endblock %}

{% block content %}
<div class="edit-page">
    <div class="edit-card">
        <h2><i class="fas fa-edit" style="color:#3498db;"></i> Edit Package</h2>
        <form method="POST">
            <div class="form-grid">
                <div class="form-group">
                    <label>Package Name</label>
                    <input type="text" name="name" value="{{ package.name }}" required>
                </div>
                <div class="form-group">
                    <label>Package Type</label>
                    <select name="package_type" required>
                        {% for t in ['Family Package','Honeymoon Package','Adventure Package','Luxury Package','Budget Package','International Package'] %}
                        <option value="{{ t }}" {% if package.package_type == t %}selected{% endif %}>{{ t }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>Destination</label>
                    <select name="destination_id">
                        <option value="">No specific destination</option>
                        {% for d in destinations %}
                        <option value="{{ d.id }}" {% if package.destination_id == d.id %}selected{% endif %}>{{ d.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>Duration</label>
                    <input type="text" name="duration" value="{{ package.duration }}">
                </div>
                <div class="form-group">
                    <label>Price (₹)</label>
                    <input type="number" name="price" value="{{ package.price }}" step="0.01" required>
                </div>
                <div class="form-group">
                    <label>Image URL</label>
                    <input type="url" name="image_url" value="{{ package.image_url }}">
                </div>
                <div class="form-group form-full">
                    <label>Description</label>
                    <textarea name="description" rows="3">{{ package.description }}</textarea>
                </div>
            </div>
            <div class="btn-row">
                <button type="submit" class="btn-save"><i class="fas fa-save"></i> Update Package</button>
                <a href="{{ url_for('admin_packages') }}" class="btn-cancel"><i class="fas fa-arrow-left"></i>&nbsp;Back</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
