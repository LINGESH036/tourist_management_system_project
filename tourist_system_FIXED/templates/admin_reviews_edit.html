{% extends "base.html" %}
{% block title %}Edit Review - Admin{% endblock %}
{% block extra_css %}
<style>
.edit-page { max-width:600px; margin:0 auto; padding:100px 1.5rem 3rem; }
.edit-card { background:white; border-radius:16px; padding:2.5rem; box-shadow:0 4px 20px rgba(0,0,0,0.08); }
.edit-card h2 { font-size:1.5rem; font-weight:700; color:#2d3436; margin-bottom:2rem; }
.form-group { margin-bottom:1.2rem; }
.form-group label { display:block; font-size:0.85rem; font-weight:600; color:#636e72; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:0.4rem; }
.form-group input, .form-group select, .form-group textarea {
    width:100%; padding:0.65rem 0.9rem; border:1.5px solid #dfe6e9; border-radius:8px;
    font-size:0.9rem; outline:none; box-sizing:border-box; transition:border-color 0.2s;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color:#f39c12; }
.btn-row { display:flex; gap:0.8rem; margin-top:1.5rem; }
.btn-save { background:linear-gradient(135deg,#f39c12,#d68910); color:white; padding:0.7rem 1.8rem; border-radius:10px; border:none; cursor:pointer; font-weight:600; font-size:0.95rem; }
.btn-cancel { background:#dfe6e9; color:#636e72; padding:0.7rem 1.5rem; border-radius:10px; border:none; cursor:pointer; font-weight:600; font-size:0.95rem; text-decoration:none; display:inline-flex; align-items:center; }
</style>
{% endblock %}

{% block content %}
<div class="edit-page">
    <div class="edit-card">
        <h2><i class="fas fa-edit" style="color:#f39c12;"></i> Edit Review #{{ review.id }}</h2>
        <form method="POST">
            <div class="form-group">
                <label>Reviewer Name</label>
                <input type="text" name="name" value="{{ review.name }}" required>
            </div>
            <div class="form-group">
                <label>Rating</label>
                <select name="rating" required>
                    {% for i in [1,2,3,4,5] %}
                    <option value="{{ i }}" {% if review.rating == i %}selected{% endif %}>{{ i }} Star{% if i > 1 %}s{% endif %}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Review Text</label>
                <textarea name="review_text" rows="5" required>{{ review.review_text }}</textarea>
            </div>
            <div class="btn-row">
                <button type="submit" class="btn-save"><i class="fas fa-save"></i> Update Review</button>
                <a href="{{ url_for('admin_reviews') }}" class="btn-cancel"><i class="fas fa-arrow-left"></i>&nbsp;Back</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
